<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Coffee Shop (PHP)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Manajemen Menu Coffee Shop</h1>
            <p>Sistem pencatatan daftar menu kopi dan cemilan berbasis PHP dan API.</p>
        </header>

        <section class="form-section card">
            <h2 id="form-title">Tambah Menu Baru</h2>
            <form id="menu-form">
                <input type="hidden" id="menu-id">
                
                <div class="input-group">
                    <label for="name">Nama Menu</label>
                    <input type="text" id="name" placeholder="Cth: Caffe Latte" required>
                </div>

                <div class="input-group">
                    <label for="category">Kategori</label>
                    <select id="category" required>
                        <option value="">-- Pilih Kategori --</option>
                        <option value="Coffee">Coffee</option>
                        <option value="Non-Coffee">Non-Coffee</option>
                        <option value="Snack">Snack</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="price">Harga (Rp)</label>
                    <input type="number" id="price" placeholder="Cth: 25000" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary" id="btn-save">Simpan Menu</button>
                    <button type="button" class="btn-secondary hidden" id="btn-cancel">Batal Ubah</button>
                </div>
            </form>
        </section>

        <section class="table-section card">
            <h2>Daftar Menu Tersedia</h2>
            <div class="table-container">
                <table id="menu-table">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Nama Menu</th>
                            <th>Kategori</th>
                            <th>Harga</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="menu-tbody">
                        <tr>
                            <td colspan="5" class="loading-state">Memuat data dari PHP Server...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Menghubungkan logika pemanggilan api.php -->
    <script src="main.js"></script>
</body>
</html>
